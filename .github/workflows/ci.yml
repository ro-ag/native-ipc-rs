name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: quality / Rust 1.97
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust 1.97
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: quality-rust-1.97
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check patch whitespace
        run: git diff --check
      - name: Run strict Clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings
      - name: Build all features
        run: cargo check --workspace --all-features --all-targets --locked
      - name: Build without default features
        run: cargo check --workspace --no-default-features --all-targets --locked
      - name: Build warning-free documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --locked

  test:
    name: test / ${{ matrix.name }} / Rust 1.97
    # A hung fixture must fail fast, not consume the full runner budget. The
    # whole suite runs in well under this bound on every target, including the
    # single-threaded macOS leg.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            # macOS exercises ptrace lifecycle fixtures that stop and reap exact
            # child processes. Run its tests single-threaded so concurrent
            # fixtures cannot race on wait(); the suite is small enough that
            # serial execution stays well within the job timeout even on a
            # shared, heavily loaded runner.
            test_threads_flag: "--test-threads=1"
          - name: windows-amd64
            os: windows-2025
            target: x86_64-pc-windows-msvc
          - name: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust 1.97
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}
      - name: Record Linux host facts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          uname -a
          uname -m
          cat /etc/os-release
          getconf GNU_LIBC_VERSION
          rustc --version --verbose
          cargo --version
          git rev-parse HEAD
          git status --short
          systemd-detect-virt || true
          systemd-detect-virt --container || true
          systemd-detect-virt --vm || true
          findmnt -no SOURCE,FSTYPE,OPTIONS /
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: tests-rust-1.97-${{ matrix.target }}
      - name: Run workspace and native permission tests
        run: cargo test --workspace --all-features --all-targets --locked --target ${{ matrix.target }} -- ${{ matrix.test_threads_flag }}
      - name: Test without default features
        run: cargo test --workspace --no-default-features --all-targets --locked --target ${{ matrix.target }} -- ${{ matrix.test_threads_flag }}
      - name: Check no-default-feature target surface
        run: cargo check --workspace --no-default-features --all-targets --locked --target ${{ matrix.target }}

  address-sanitizer:
    name: address sanitizer / linux-amd64
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install nightly Rust with standard-library sources
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
          components: rust-src
          targets: x86_64-unknown-linux-gnu
      - name: Cache sanitizer artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: address-sanitizer-linux-amd64
      - name: Run instrumented workspace and native lifecycle tests
        env:
          ASAN_OPTIONS: detect_leaks=1:detect_stack_use_after_return=1:halt_on_error=1
          RUSTFLAGS: -Zsanitizer=address -Cforce-frame-pointers=yes
          RUSTDOCFLAGS: -Zsanitizer=address -Cforce-frame-pointers=yes
        run: cargo +nightly test -Zbuild-std --workspace --all-features --all-targets --locked --target x86_64-unknown-linux-gnu

  dependencies:
    name: dependency and license policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cargo-deny
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-deny@0.19.8
      - name: Check advisories, licenses, bans, and sources
        run: cargo deny check

  miri:
    name: miri / platform-neutral core
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install nightly Miri
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
          components: miri
      - name: Run Miri on platform-neutral unsafe contracts
        run: cargo +nightly miri test -p native-ipc-core --lib

  fuzz-smoke:
    name: fuzz smoke / envelope and layout
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-fuzz@0.13.1
      - name: Fuzz envelope decoder
        run: cargo +nightly fuzz run envelope --fuzz-dir fuzz --target x86_64-unknown-linux-gnu -- -runs=10000 -max_len=4096 -timeout=5 -rss_limit_mb=1024
      - name: Fuzz layout decoder
        run: cargo +nightly fuzz run layout --fuzz-dir fuzz --target x86_64-unknown-linux-gnu -- -runs=10000 -max_len=16384 -timeout=5 -rss_limit_mb=1024
