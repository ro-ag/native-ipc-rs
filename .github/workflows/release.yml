name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed release tag
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish crates and GitHub release
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Install release toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.97.0

      - name: Validate tag and workspace version
        id: release
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid release tag: $RELEASE_TAG" >&2
            exit 1
          }
          version="${RELEASE_TAG#v}"
          versions="$(cargo metadata --no-deps --format-version 1 | jq -r '[.packages[].version] | unique | .[]')"
          test "$versions" = "$version" || {
            echo "tag $RELEASE_TAG does not match the single workspace version: $versions" >&2
            exit 1
          }
          git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}" >/dev/null
          test "$(git rev-parse HEAD)" = "$(git rev-parse "$RELEASE_TAG^{commit}")"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          is_published() {
            local crate="$1"
            curl --fail --silent --show-error \
              --user-agent "native-ipc-release/${RELEASE_VERSION}" \
              "https://crates.io/api/v1/crates/${crate}" |
              jq -e --arg version "$RELEASE_VERSION" \
                '.versions | any(.num == $version and (.yanked | not))' >/dev/null
          }

          wait_until_published() {
            local crate="$1"
            for _ in $(seq 1 60); do
              if is_published "$crate"; then
                return 0
              fi
              sleep 5
            done
            echo "timed out waiting for ${crate} ${RELEASE_VERSION}" >&2
            return 1
          }

          publish_crate() {
            local crate="$1"
            if is_published "$crate"; then
              echo "${crate} ${RELEASE_VERSION} is already published"
              return 0
            fi
            cargo publish --dry-run -p "$crate" --locked
            cargo publish -p "$crate" --locked
            wait_until_published "$crate"
          }

          publish_crate native-ipc-core
          publish_crate native-ipc-platform
          publish_crate native-ipc-testkit
          publish_crate native-ipc

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release $RELEASE_TAG already exists"
            exit 0
          fi
          awk -v version="$RELEASE_VERSION" '
            index($0, "## [" version "]") == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "native-ipc $RELEASE_VERSION" \
            --notes-file release-notes.md
